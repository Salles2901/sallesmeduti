<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rceitas - Vinicius Salles</title>
<style>
  :root{
    --bg:#0f172a; --card:#111827; --muted:#94a3b8; --text:#e5e7eb; --accent:#22d3ee; --line:#334155; --pill:#1f2937;
  }
  *{box-sizing:border-box}
  body{margin:0; background:var(--bg); color:var(--text); font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial}
  .app{min-height:100vh; display:flex; flex-direction:column}
  header{border-bottom:1px solid var(--line); padding:12px 16px; display:flex; align-items:center; gap:12px; flex-wrap:wrap; background:#0b1220}
  header h1{font-size:18px; margin:0}
  .tabs{display:flex; gap:8px; flex-wrap:wrap}
  .tab-btn{display:inline-block; padding:8px 12px; border-radius:10px; border:1px solid var(--line); background:#0b1324; color:var(--text); cursor:pointer; text-decoration:none}
  .tab-btn.active{background:linear-gradient(180deg,#0ea5e9,#06b6d4); color:#001018; border-color:transparent; font-weight:600}
  .container{display:grid; grid-template-columns: var(--sidebar-width, 320px) 6px 1fr; gap:0; flex:1; min-height:0}
  aside{border-right:1px solid var(--line); padding:16px; background:#0b1220}
  .search{display:flex; gap:8px; margin-bottom:12px}
  .search input{flex:1; padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:#0a0f1c; color:var(--text)}
  .tag{display:inline-block; padding:6px 10px; border-radius:999px; background:var(--pill); color:var(--muted); font-size:12px; margin-bottom:8px}
  .list{margin-top:8px; overflow:auto; max-height:calc(100vh - 200px); padding-right:4px}
  .item{padding:10px 12px; border:1px solid var(--line); border-radius:10px; margin-bottom:8px; cursor:pointer; background:linear-gradient(180deg,#0d1527,#0a1020)}
  .item:hover{border-color:var(--accent)}
  .item.active{outline:2px solid var(--accent); outline-offset:2px}
  main{padding:20px; overflow:auto}
  #mainPadrao, #mainUnidade{grid-column:3; min-width:0}
  .header-line{display:flex; align-items:center; gap:10px; margin-bottom:14px; flex-wrap:wrap}
  .header-line>.primary{margin-left:auto}
  .header-line>.layout-toggle{margin-left:auto}
  .header-line h2{margin:0; font-size:18px}
  .controls{display:flex; gap:8px; flex-wrap:wrap}
  button{padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:#0b1324; color:#fff; cursor:pointer}
  button.primary{background:linear-gradient(180deg,#0ea5e9,#06b6d4); color:#001018; border-color:transparent; font-weight:600}
  button:disabled{opacity:.55; cursor:not-allowed}
  .pill{padding:6px 10px; border-radius:999px; background:var(--pill); color:var(--muted); font-size:12px}
  .card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; margin-bottom:14px}
  .via{font-weight:700; letter-spacing:.5px; color:#cbd5e1; margin:8px 0 6px}
  .med{display:flex; gap:10px; align-items:flex-start; padding:10px; border:1px dashed var(--line); border-radius:10px; margin:8px 0; background:#0b1324}
  .med input[type="checkbox"]{margin-top:3px}
  .medlines{white-space:pre-wrap; font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; font-size:13.5px; line-height:1.25}
  .preview-wrap{display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:8px}
  .preview{white-space:pre-wrap; font-family:ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono","Courier New", monospace; font-size:13.5px; line-height:1.25; background:#0b1324; border:1px dashed var(--line); border-radius:10px; padding:12px; min-height:120px}
  .weight-control{display:none; align-items:center; gap:8px}
  .weight-control label{font-size:12px; color:var(--muted)}
  .weight-control input{width:90px; padding:6px 8px; border-radius:8px; border:1px solid var(--line); background:#0a0f1c; color:var(--text); text-align:right}
  .unit-preview{display:flex; align-items:flex-start; justify-content:space-between; gap:12px; margin-bottom:8px}
  .unit-lines{display:flex; flex-direction:column; gap:6px; margin:8px 0}
  .unit-line{display:flex; gap:8px; align-items:flex-start; padding:6px 8px; border:1px dashed var(--line); border-radius:10px; background:#0b1324}
  .unit-line input{margin-top:4px}
  .unit-line-text{flex:1; white-space:pre-wrap; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace; font-size:13px; line-height:1.3}
  .unit-line-header{font-weight:600; color:#f8fafc; white-space:pre-wrap; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace; font-size:13px; line-height:1.3}
  .unit-added-lines{display:flex; flex-direction:column; gap:6px}
  .unit-line.added button{margin-left:auto}
  .unit-actions{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-top:10px}
  .unit-actions-left{display:flex; gap:8px; flex-wrap:wrap}
  .unit-actions .copy-btn{margin-left:auto}
  .sidebar-resizer{width:6px; cursor:col-resize; position:relative; background:transparent}
  .sidebar-resizer::before{content:""; position:absolute; top:0; bottom:0; left:50%; width:2px; transform:translateX(-50%); background:var(--line); opacity:.6}
  .sidebar-resizer:hover::before{background:var(--accent)}
  body.resizing{user-select:none; cursor:col-resize}
  .sidebar-toggle{padding:8px 12px; border-radius:10px; border:1px solid var(--line); background:#1e293b; color:var(--text); cursor:pointer}
  .sidebar-toggle:hover{border-color:var(--accent)}
  .extra-options{display:flex; gap:12px; flex-wrap:wrap; margin:8px 0 0}
  .extra-options label{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--muted)}
  .add-section{margin-top:12px; padding-top:12px; border-top:1px dashed var(--line)}
  .add-toggle{margin-top:8px; background:#0b1b32; border-color:var(--line)}
  .add-panel{display:none; flex-direction:column; gap:10px; margin-top:10px; background:#081020; border:1px dashed var(--line); border-radius:12px; padding:12px}
  .add-panel.open{display:flex}
  .add-panel select,.add-panel input[type="number"], .add-panel input[type="text"]{width:100%; padding:8px 10px; border-radius:10px; border:1px solid var(--line); background:#050912; color:var(--text)}
  .add-controls{display:flex; flex-direction:column; gap:10px}
  .field{display:flex; flex-direction:column; gap:4px; font-size:12px; color:var(--muted)}
  .via-choice{display:flex; gap:10px; flex-wrap:wrap}
  .via-choice label{display:flex; align-items:center; gap:6px; font-size:12px; color:var(--text)}
  .added-list{display:flex; flex-direction:column; gap:8px; margin-top:10px}
  .added-item{display:flex; gap:8px; justify-content:space-between; padding:10px; border:1px dashed var(--line); border-radius:10px; background:#0b1324}
  .added-item-text{flex:1; white-space:pre-wrap; font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,"Liberation Mono","Courier New",monospace; font-size:13px; line-height:1.3}
  .added-actions{display:flex; gap:8px; flex-wrap:wrap; margin-top:6px}
  #unidadeContent{display:flex; flex-direction:column; gap:16px}
  #unidadeContent .card{margin:0}
  #mainUnidade.layout-grid #unidadeContent{display:grid; grid-template-columns:repeat(auto-fit,minmax(320px,1fr)); gap:16px}
  #mainUnidade.layout-grid #unidadeContent .card{margin:0}
  .container.sidebar-collapsed{grid-template-columns:0 0 1fr}
  .container.sidebar-collapsed aside{display:none}
  .container.sidebar-collapsed .sidebar-resizer{display:none}
  .container.unidade{grid-template-columns:0 0 1fr}
  .container.unidade aside{display:none}
  .container.unidade .sidebar-resizer{display:none}
  .muted{color:var(--muted)}
  .grid{display:grid; grid-template-columns: repeat(2,minmax(0,1fr)); gap:12px}
  .grid-3{display:grid; grid-template-columns: 2fr 1fr 1fr; gap:12px}
  .full{grid-column:1/-1}
  .field{display:flex; flex-direction:column; gap:6px}
  .field label{font-size:12px; color:#cbd5e1}
  .field input, .field select, .field textarea{
    padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:#0a0f1c; color:var(--text)
  }
  .toast{position:fixed; right:16px; bottom:16px; background:#10b981; color:#062016; padding:10px 12px; border-radius:10px; font-weight:600; display:none}
  .modal{position:fixed; inset:0; background:rgba(6,11,22,.65); display:none; align-items:center; justify-content:center; padding:16px}
  .modal.open{display:flex}
  .modal-card{width:min(920px,100%); background:#0b1220; border:1px solid var(--line); border-radius:16px; padding:16px; box-shadow:0 20px 60px rgba(0,0,0,.4)}
  .modal-header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:12px}
  .modal-title{font-weight:700}
  .modal-close{background:#1f2937; border-color:var(--line)}
  .upper-grid{display:grid; grid-template-columns:1fr 1fr; gap:12px}
  .upper-box{display:flex; flex-direction:column; gap:8px}
  .upper-box textarea{min-height:180px; resize:vertical}
  .upper-box textarea{
    padding:10px 12px; border-radius:10px; border:1px solid var(--line);
    background:#0a0f1c; color:var(--text);
  }
  .upper-output{position:relative}
  .upper-output button{position:absolute; top:10px; right:10px}
  @media (max-width: 720px){
    .upper-grid{grid-template-columns:1fr}
  }
  #mainDescricoes{grid-column:3; min-width:0; overflow:auto}
  .desc-search{padding:16px 20px 0; max-width:420px}
  .desc-search input{width:100%; padding:10px 12px; border-radius:10px; border:1px solid var(--line); background:#0a0f1c; color:var(--text)}
  .desc-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(400px,1fr)); gap:16px; padding:20px}
  .desc-card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:16px; display:flex; flex-direction:column; gap:8px}
  .desc-card-grupo{display:inline-block; padding:3px 9px; border-radius:999px; background:var(--pill); color:var(--muted); font-size:11px; letter-spacing:.4px; width:fit-content}
  .desc-card-title{font-weight:700; font-size:14px; color:#f1f5f9}
  .desc-card-text{white-space:pre-wrap; font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono","Courier New",monospace; font-size:13px; line-height:1.5; color:var(--text); flex:1; background:#0b1324; border:1px dashed var(--line); border-radius:10px; padding:12px}
  .desc-card-footer{display:flex; justify-content:flex-end; margin-top:4px}
  .desc-empty{color:var(--muted); padding:32px 20px; font-size:14px}
  @media(max-width:600px){.desc-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>Receitas - Vinicius Salles</h1>
    <div class="tabs">
      <span id="tabPadrao" class="tab-btn active">Prescrições Padrão</span>
      <span id="tabUnidade" class="tab-btn">Medicação na Unidade</span>
      <span id="tabDescricoes" class="tab-btn">Anamnese</span>
      <button id="btnUppercase" class="tab-btn" type="button">MAIÚSCULO</button>
    </div>
  </header>

  <div id="container" class="container">
    <aside>
      <div class="tag">Patologias - Receitas Prontas</div>
      <div class="search">
        <input id="search" placeholder="Filtrar patologias..." />
      </div>
      <div id="patList" class="list"></div>
    </aside>
    <div id="sidebarResizer" class="sidebar-resizer" aria-hidden="true"></div>

    <!-- PADRÃO -->
    <main id="mainPadrao">
      <div class="header-line">
        <h2 id="title">Selecione uma patologia</h2>
        <span id="counter" class="pill"></span>
        <button id="btnToggleSidebar" class="sidebar-toggle">Ocultar painel</button>
        <div id="weightWrap" class="weight-control">
          <label for="weightInput">Peso (kg)</label>
          <input id="weightInput" type="number" min="1" step="0.1" inputmode="decimal" placeholder="Ex: 70" />
        </div>
        <div class="controls">
          <button id="btnSelectAll">Selecionar tudo</button>
          <button id="btnClearAll">Limpar seleção</button>
        </div>
        <button id="btnCopyHeader" class="primary" disabled>Copiar receita</button>
      </div>

      <div id="content"></div>

      <div class="card">
        <div class="preview-wrap">
          <strong>Pré-visualização (Padrão)</strong>
          <button id="btnCopyPreview" class="primary" disabled>Copiar receita</button>
        </div>
        <div id="preview" class="preview" aria-live="polite"></div>
      </div>
    </main>
    <main id="mainUnidade" style="display:none;">
      <div class="header-line">
        <h2>Medicações na Unidade</h2>
        <button id="btnToggleLayout" class="sidebar-toggle layout-toggle">Ver em lista</button>
      </div>
      <div id="unidadeContent"></div>
    </main>
    <main id="mainDescricoes" style="display:none;">
      <div class="desc-search">
        <input id="descSearch" placeholder="Filtrar descrições..." />
      </div>
      <div id="descGrid" class="desc-grid"></div>
    </main>
  </div>
</div>

<div id="uppercaseModal" class="modal" aria-hidden="true">
  <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="uppercaseTitle">
    <div class="modal-header">
      <div id="uppercaseTitle" class="modal-title">CONVERTER TEXTO EM MAIÚSCULO</div>
      <button id="btnUppercaseClose" class="modal-close" type="button">Fechar</button>
    </div>
    <div class="upper-grid">
      <div class="upper-box">
        <label for="uppercaseInput">TEXTO ORIGINAL</label>
        <textarea id="uppercaseInput" placeholder="Digite aqui..."></textarea>
      </div>
      <div class="upper-box upper-output">
        <label for="uppercaseOutput">TEXTO EM MAIÚSCULO</label>
        <button id="btnCopyUppercase" class="primary" type="button">Copiar texto</button>
        <textarea id="uppercaseOutput" readonly></textarea>
      </div>
    </div>
  </div>
</div>

<div id="toast" class="toast">Copiado para a área de transferência</div>

<script>
/* ======== TOAST + CÓPIA ======== */
function showToast(msg="Copiado!"){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  setTimeout(()=>{t.style.display='none'},1400);
}
async function copyText(txt){
  try{
    await navigator.clipboard.writeText(txt);
    showToast();
  }catch(e){
    const ta=document.createElement('textarea');
    ta.value=txt; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); ta.remove();
    showToast();
  }
}

/* ======== MAIÚSCULO ======== */
const uppercaseModal = document.getElementById('uppercaseModal');
const btnUppercase = document.getElementById('btnUppercase');
const btnUppercaseClose = document.getElementById('btnUppercaseClose');
const uppercaseInput = document.getElementById('uppercaseInput');
const uppercaseOutput = document.getElementById('uppercaseOutput');
const btnCopyUppercase = document.getElementById('btnCopyUppercase');

function openUppercase(){
  uppercaseModal.classList.add('open');
  uppercaseModal.setAttribute('aria-hidden','false');
  uppercaseInput.focus();
}
function closeUppercase(){
  uppercaseModal.classList.remove('open');
  uppercaseModal.setAttribute('aria-hidden','true');
  uppercaseInput.value = '';
  uppercaseOutput.value = '';
}
function syncUppercase(){
  uppercaseOutput.value = uppercaseInput.value.toUpperCase();
}

btnUppercase.addEventListener('click', openUppercase);
btnUppercaseClose.addEventListener('click', closeUppercase);
uppercaseModal.addEventListener('click', (e)=>{ if(e.target===uppercaseModal) closeUppercase(); });
uppercaseInput.addEventListener('input', syncUppercase);
btnCopyUppercase.addEventListener('click', ()=>copyText(uppercaseOutput.value));

  if(rawValue==null || rawValue==='') return option.variable.default ?? '';
  const numeric=parseFloat(String(rawValue).replace(',', '.'));
  if(!Number.isFinite(numeric)) return option.variable.default ?? '';
  let val=numeric;
  if(typeof option.variable.min==='number') val=Math.max(option.variable.min, val);
  if(typeof option.variable.max==='number') val=Math.min(option.variable.max, val);
  if(option.variable.step && option.variable.step>=1) val=Math.round(val);
  const precision=option.variable.step && option.variable.step<1 ? (1/option.variable.step) : 1;
  if(precision>1){
    const factor=precision;
    val=Math.round(val*factor)/factor;
  }
  return val;
}
function formatAddedMedication(option, config={}){
  if(!option) return '';
  let text=option.template || option.label || '';
  const viaToken=/\{\{via\}\}/gi;
  if(viaToken.test(text)){
    const via=(config.via || option.routes && option.routes[0] || '').trim().toUpperCase();
    text=text.replace(viaToken, via || '');
  }
  if(option.variable){
    const value=(config.value ?? option.variable.default ?? '').toString();
    text=text.replace(/\{\{value\}\}/g, value);
  }
  text=text.replace(/\s+/g,' ').trim();
  return `• ${text} AGORA`;
}

function isIntLike(val){
  return Math.abs(val - Math.round(val)) < 1e-6;
}
function formatWeightLabel(val){
  const opts=isIntLike(val)?{minimumFractionDigits:0, maximumFractionDigits:0}:{minimumFractionDigits:1, maximumFractionDigits:1};
  return new Intl.NumberFormat('pt-BR', opts).format(val);
}
function formatVolumeLabel(val){
  return new Intl.NumberFormat('pt-BR',{minimumFractionDigits:0, maximumFractionDigits:0}).format(Math.round(val));
}
function formatWeightInputValue(val){
  if(val==null) return '';
  const rounded=Math.round(val*10)/10;
  return isIntLike(rounded)?String(Math.round(rounded)):rounded.toString();
}
function formatLines(pat, lines){
  if(pat==='DENGUE' && Array.isArray(lines) && lines.length && lines[0].includes('SAIS DE REIDRATAÇÃO ORAL')){
    const hasWeight=typeof dengueWeight==='number' && dengueWeight>0;
    const pesoTxt=hasWeight?formatWeightLabel(dengueWeight):'—';
    const saisTxt=hasWeight?formatVolumeLabel(dengueWeight*20):'—';
    const liquidosTxt=hasWeight?formatVolumeLabel(dengueWeight*40):'—';
    return lines.map((line, idx)=>{
      if(idx===0) return line;
      return line
        .replace(/{{PESO}}/g, pesoTxt)
        .replace(/{{SAIS_TOTAL}}/g, saisTxt)
        .replace(/{{LIQ_TOTAL}}/g, liquidosTxt);
    });
  }
  return lines.slice();
}

  {grupo:"PROTOCOLO",titulo:"ADMISSÃO – PROTOCOLO DE TRAUMA (ABCDE)",texto:"PACIENTE ADMITIDO EM SALA DE EMERGÊNCIA, TRAZIDO PELO SIATE/SAMU, EM PRANCHA RÍGIDA E COM COLAR CERVICAL, EM PROTOCOLO DE TRAUMA.\n\nA – AIRWAY + PROTEÇÃO DA COLUNA CERVICAL:\nPACIENTE EM COLAR CERVICAL, COM IMOBILIZAÇÃO DA COLUNA CERVICAL MANTIDA. VIAS AÉREAS PÉRVIAS, PACIENTE CONSCIENTE, RESPONSIVO, VERBALIZANDO ESPONTANEAMENTE, SEM SINAIS DE OBSTRUÇÃO DE VIAS AÉREAS. AUSÊNCIA DE SANGRAMENTO ATIVO OU CORPOS ESTRANHOS EM CAVIDADE ORAL.\n\nB – BREATHING:\nRESPIRAÇÃO ESPONTÂNEA, EUPNEICO EM AR AMBIENTE. EXPANSIBILIDADE TORÁCICA SIMÉTRICA. MURMÚRIOS VESICULARES PRESENTES BILATERALMENTE, SEM RUÍDOS ADVENTÍCIOS. SATURAÇÃO DE O₂ ADEQUADA. AUSÊNCIA DE SINAIS DE DESCONFORTO RESPIRATÓRIO.\n\nC – CIRCULATION:\nPACIENTE HEMODINAMICAMENTE ESTÁVEL. PULSOS PERIFÉRICOS PALPÁVEIS E SIMÉTRICOS. ENCHIMENTO CAPILAR < 3 SEGUNDOS. PELE CORADA E NORMOTÉRMICA. AUSÊNCIA DE SANGRAMENTOS EXTERNOS ATIVOS. ACESSO VENOSO PERIFÉRICO CALIBROSO INSTALADO.\n\nD – DISABILITY:\nPACIENTE CONSCIENTE E ORIENTADO EM TEMPO, ESPAÇO E PESSOA. ESCALA DE COMA DE GLASGOW 15 (A4 V5 M6). PUPILAS ISOCÓRICAS E FOTORREAGENTES. SEM DÉFICITS MOTORES OU SENSITIVOS EVIDENTES À AVALIAÇÃO INICIAL.\n\nE – EXPOSURE:\nPACIENTE TOTALMENTE EXPOSTO PARA AVALIAÇÃO SECUNDÁRIA. AUSÊNCIA DE ESCORIAÇÕES, CONTUSÕES OU DEFORMIDADES EVIDENTES. SEM FERIMENTOS PENETRANTES IDENTIFICADOS. CONTROLE TÉRMICO ADEQUADO COM COBERTOR.\n\nAVALIAÇÃO SECUNDÁRIA:\nPACIENTE NEGA DOR NO MOMENTO. NEGA PERDA DE CONSCIÊNCIA. NEGA NÁUSEAS, VÔMITOS, CEFALEIA, DOR TORÁCICA OU DISPNEIA. SEM QUEIXAS NO MOMENTO DA AVALIAÇÃO.\nANTECEDENTES PESSOAIS: NEGA COMORBIDADES.\nUSO DE MEDICAÇÕES CONTÍNUAS: NEGA.\nALERGIAS: NEGA.\nÚLTIMA REFEIÇÃO: HÁ MENOS DE 6 HORAS.\n\nCONDUTA:\nMANTER PROTOCOLO DE TRAUMA E IMOBILIZAÇÃO. MONITORIZAÇÃO CONTÍNUA. EXAMES COMPLEMENTARES CONFORME PROTOCOLO DE TRAUMA. ANALGESIA SE NECESSÁRIO. REAVALIAÇÕES SERIADAS."},

];

function renderDescricoes(filter=''){
  if(!descGridEl) return;
  const q=filter.trim().toLowerCase();
  const visible=q ? descricoes.filter(d=>d.titulo.toLowerCase().includes(q)||d.grupo.toLowerCase().includes(q)||d.texto.toLowerCase().includes(q)) : descricoes;
  descGridEl.innerHTML='';
  if(!visible.length){
    const empty=document.createElement('div'); empty.className='desc-empty';
    empty.textContent='Nenhuma descrição encontrada.';
    descGridEl.appendChild(empty);
    return;
  }
  visible.forEach(d=>{
    const card=document.createElement('div'); card.className='desc-card';
    const grupo=document.createElement('span'); grupo.className='desc-card-grupo'; grupo.textContent=d.grupo;
    const titulo=document.createElement('div'); titulo.className='desc-card-title'; titulo.textContent=d.titulo;
    const text=document.createElement('div'); text.className='desc-card-text'; text.textContent=d.texto;
    const footer=document.createElement('div'); footer.className='desc-card-footer';
    const btn=document.createElement('button'); btn.className='primary'; btn.textContent='Copiar';
    btn.onclick=()=>copyText(d.texto);
    footer.appendChild(btn);
    card.appendChild(grupo); card.appendChild(titulo); card.appendChild(text); card.appendChild(footer);
    descGridEl.appendChild(card);
  });
}
if(descSearchEl) descSearchEl.addEventListener('input',()=>renderDescricoes(descSearchEl.value));

function setTab(tab){
  currentTab=tab;
  const isPadrao=tab==='padrao';
  const isUnidade=tab==='unidade';
  const isDescricoes=tab==='descricoes';
  if(tabPadraoBtn) tabPadraoBtn.classList.toggle('active', isPadrao);
  if(tabUnidadeBtn) tabUnidadeBtn.classList.toggle('active', isUnidade);
  if(tabDescricoesBtn) tabDescricoesBtn.classList.toggle('active', isDescricoes);
  if(containerEl) containerEl.classList.toggle('unidade', !isPadrao);
  if(mainPadrao) mainPadrao.style.display=isPadrao?'':'none';
  if(mainUnidade) mainUnidade.style.display=isUnidade?'':'none';
  if(mainDescricoes) mainDescricoes.style.display=isDescricoes?'':'none';
  if(weightWrap && !isPadrao) weightWrap.style.display='none';
  if(btnToggleLayout) btnToggleLayout.style.display=isUnidade?'':'none';
  applyUnidadeLayout();
  if(isPadrao) renderPadrao();
  else if(isUnidade) renderUnidade();
  else if(isDescricoes) renderDescricoes(descSearchEl?descSearchEl.value:'');
  updateSidebarUI();
}
if(tabPadraoBtn) tabPadraoBtn.onclick=()=>setTab('padrao');
if(tabUnidadeBtn) tabUnidadeBtn.onclick=()=>setTab('unidade');
if(tabDescricoesBtn) tabDescricoesBtn.onclick=()=>setTab('descricoes');
if(weightInput){
  weightInput.addEventListener('input', ()=>{
    const rawValue=weightInput.value;
    const numeric=parseFloat(rawValue.replace(',', '.'));
    if(Number.isFinite(numeric) && numeric>0){
      dengueWeight=numeric;
    }else if(rawValue.trim()===''){
      dengueWeight=null;
    }
    if(activePat==='DENGUE'){
      renderPadrao();
      weightInput.value=rawValue;
    }
  });
}

function setSidebarCollapsed(value){
  sidebarCollapsed=value;
  safeStorageSet(STORAGE_COLLAPSE_KEY, value ? 'true' : 'false');
  updateSidebarUI();
}
if(btnToggleSidebar){
  btnToggleSidebar.addEventListener('click', ()=>{
    setSidebarCollapsed(!sidebarCollapsed);
  });
}
if(btnToggleLayout){
  btnToggleLayout.addEventListener('click', ()=>{
    unidadeLayout = unidadeLayout==='grid' ? 'list' : 'grid';
    safeStorageSet(STORAGE_LAYOUT_KEY, unidadeLayout);
    applyUnidadeLayout();
  });
}
function handleResizeStart(evt){
  if(sidebarCollapsed || currentTab!=='padrao') return;
  isResizing=true;
  startX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  startWidth = sidebarWidth;
  document.body.classList.add('resizing');
  evt.preventDefault();
}
function handleResizeMove(evt){
  if(!isResizing) return;
  const clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
  const delta = clientX - startX;
  const newWidth = clampSidebarWidth(startWidth + delta);
  if(newWidth !== sidebarWidth){
    sidebarWidth = newWidth;
    containerEl.style.setProperty('--sidebar-width', `${Math.round(sidebarWidth)}px`);
  }
  evt.preventDefault();
}
function handleResizeEnd(){
  if(!isResizing) return;
  isResizing=false;
  document.body.classList.remove('resizing');
  safeStorageSet(STORAGE_WIDTH_KEY, Math.round(sidebarWidth));
  updateSidebarUI();
}
if(sidebarResizer){
  sidebarResizer.addEventListener('mousedown', handleResizeStart);
  sidebarResizer.addEventListener('touchstart', handleResizeStart, {passive:false});
}
document.addEventListener('mousemove', handleResizeMove);
document.addEventListener('touchmove', handleResizeMove, {passive:false});
document.addEventListener('mouseup', handleResizeEnd);
document.addEventListener('touchend', handleResizeEnd);
document.addEventListener('touchcancel', handleResizeEnd);
window.addEventListener('resize', ()=>{
  if(!sidebarCollapsed){
    sidebarWidth = clampSidebarWidth(sidebarWidth);
    updateSidebarUI();
    safeStorageSet(STORAGE_WIDTH_KEY, Math.round(sidebarWidth));
    startWidth = sidebarWidth;
  }
});

updateSidebarUI();
applyUnidadeLayout();

function renderPatList(filter=""){
  patListEl.innerHTML='';
  const pats=ORDER.filter(p=>prescriptions[p]).filter(p=>p.toLowerCase().includes(filter.toLowerCase()));
  pats.forEach(p=>{
    const d=document.createElement('div');
    d.className='item'+(p===activePat?' active':'');
    d.textContent=p;
    d.onclick=()=>{activePat=p;renderPadrao();};
    patListEl.appendChild(d);
  });
  if(!activePat && pats.length){activePat=pats[0];renderPadrao();}
}
searchEl.oninput=()=>renderPatList(searchEl.value);

function renderPadrao(){
  if(!activePat){
    titleEl.textContent='Selecione uma patologia';
    contentEl.innerHTML=''; previewEl.textContent='';
    if(weightWrap) weightWrap.style.display='none';
    btnCopyPreview.disabled=true;
    if(btnCopyHeader) btnCopyHeader.disabled=true;
    return;
  }
  titleEl.textContent=activePat;
  const isDengue=activePat==='DENGUE';
  if(weightWrap){
    weightWrap.style.display=isDengue?'flex':'none';
    if(isDengue && weightInput){
      weightInput.value=formatWeightInputValue(dengueWeight);
    }
  }
  const data=prescriptions[activePat];
  contentEl.innerHTML='';
  let total=0,sel=0;

  Object.entries(data.sections).forEach(([via,items])=>{
    const card=document.createElement('div'); card.className='card';
    const h=document.createElement('div'); h.className='via'; h.textContent=via; card.appendChild(h);
    items.forEach(it=>{
      total++; if(it.selected) sel++;
      const row=document.createElement('label'); row.className='med';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.checked=!!it.selected;
      cb.onchange=()=>{it.selected=cb.checked; updateState();};
      const lines=document.createElement('div'); lines.className='medlines';
      const displayLines=formatLines(activePat, it.lines);
      lines.textContent=displayLines.join('\n');
      row.appendChild(cb); row.appendChild(lines); card.appendChild(row);
    });
    contentEl.appendChild(card);
  });

  counterEl.textContent=sel?`${sel}/${total} selecionados`:`${total} itens`;
  const hasSelection = sel>0;
  btnCopyPreview.disabled = sel===0;
  if(btnCopyHeader) btnCopyHeader.disabled = !hasSelection;
  updatePreview();
}
function updateState(){
  if(!activePat) return;
  let total=0,sel=0;
  const data=prescriptions[activePat];
  Object.values(data.sections).forEach(items=>{
    items.forEach(it=>{ total++; if(it.selected) sel++; });
  });
  counterEl.textContent=sel?`${sel}/${total} selecionados`:`${total} itens`;
  const hasSelection = sel>0;
  btnCopyPreview.disabled = sel===0;
  if(btnCopyHeader) btnCopyHeader.disabled = !hasSelection;
  updatePreview();
}
function buildText(){
  if(!activePat) return '';
  const data=prescriptions[activePat];
  const parts=[];
  Object.entries(data.sections).forEach(([via,items])=>{
    const chosen=items.filter(it=>it.selected);
    if(!chosen.length) return;
    parts.push(via); parts.push('');
    chosen.forEach(it=>{
      const displayLines=formatLines(activePat, it.lines);
      if(!displayLines.length) return;
      parts.push(displayLines[0]);
      for(let i=1;i<displayLines.length;i++){ parts.push(displayLines[i]); }
      parts.push('');
    });
  });
  while(parts.length && parts[parts.length-1]==='') parts.pop();
  return parts.join('\n');
}
function updatePreview(){
  const txt=buildText();
  previewEl.textContent = txt || '— Nada selecionado —';
  const hasText = !!txt.trim().length;
  btnCopyPreview.disabled = !hasText;
  if(btnCopyHeader) btnCopyHeader.disabled = !hasText;
}
btnSelectAll.onclick=()=>{ if(!activePat) return; Object.values(prescriptions[activePat].sections).forEach(items=>items.forEach(it=>it.selected=true)); renderPadrao(); };
btnClearAll.onclick=()=>{ if(!activePat) return; Object.values(prescriptions[activePat].sections).forEach(items=>items.forEach(it=>it.selected=false)); renderPadrao(); };
const btnCopyHeader=document.getElementById('btnCopyHeader');
if(btnCopyHeader){ btnCopyHeader.onclick=()=>{ const txt=buildText(); if(txt.trim().length) copyText(txt); }; btnCopyHeader.disabled=true; }
btnCopyPreview.onclick=()=>{ const txt=buildText(); if(txt.trim().length) copyText(txt); };
renderUnidade();
renderPatList();
setTab('padrao');


</script>
