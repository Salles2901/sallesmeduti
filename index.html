<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0b6b71" />
  <title>SalleMED – UTI</title>
  <meta name="description" content="Guia de bolso clínico para plantão em UTI: drogas, doses, fluxogramas e prescrições prontas." />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/layout.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/themes.css" />
</head>
<body>
  <a class="skip-link" href="#main">Pular para o conteúdo</a>

  <header class="topbar" role="banner">
    <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Abrir menu" aria-expanded="false">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
    </button>

    <a href="#/" class="brand" aria-label="SalleMED UTI - início">
      <svg viewBox="0 0 32 32" width="28" height="28" aria-hidden="true">
        <rect x="2" y="2" width="28" height="28" rx="6" fill="currentColor" opacity=".12"/>
        <path d="M16 7v18M7 16h18" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
      </svg>
      <span class="brand-text"><strong>SalleMED</strong><span class="brand-sub">UTI</span></span>
    </a>

    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
      <input type="search" id="globalSearch" placeholder="Buscar droga, capítulo, microrganismo, fórmula…" aria-label="Buscar no guia" autocomplete="off" />
      <kbd class="search-kbd" aria-hidden="true">/</kbd>
    </div>

    <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Alternar tema claro/escuro">
      <svg class="icon-sun" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
      <svg class="icon-moon" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
    </button>
  </header>

  <div class="app">
    <aside class="sidebar" id="sidebar" aria-label="Navegação do guia">
      <nav id="chapterNav"></nav>
      <div class="sidebar-footer">
        <small>Baseado no <em>Guia– Terapia Intensiva</em> SALLESMED </small>
      </div>
    </aside>

    <div class="sidebar-backdrop" id="sidebarBackdrop" hidden></div>

    <main id="main" class="content" tabindex="-1">
      <div id="searchResults" class="search-results" hidden></div>
      <article id="view" class="view"></article>
    </main>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
